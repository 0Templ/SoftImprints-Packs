name: Release pack

on:
  push:
    tags:
      - '*-v*'

  workflow_dispatch:
    inputs:
      pack:
        description: 'Pack id'
        required: true
        type: string
      version:
        description: 'Version, e.g. 1.0.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build pack
    runs-on: ubuntu-latest

    outputs:
      pack: ${{ steps.parse.outputs.pack }}
      version: ${{ steps.parse.outputs.version }}
      filename: ${{ steps.build.outputs.filename }}
      path: ${{ steps.build.outputs.path }}
      display_name: ${{ steps.build.outputs.display_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Parse tag
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PACK="${{ inputs.pack }}"
            VERSION="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ ! "$TAG" =~ ^([a-z0-9][a-z0-9_-]*)-v([0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?)$ ]]; then
              echo "::error::Invalid tag '$TAG'. Expected: <packId>-v<semver>, e.g. faithful_32-v1.0.0"
              exit 1
            fi
            PACK="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
          fi

          echo "Parsed pack='$PACK' version='$VERSION'"
          {
            echo "pack=$PACK"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Build pack
        id: build
        run: |
          node scripts/pack.mjs \
            "${{ steps.parse.outputs.pack }}" \
            --mode=release \
            --version="${{ steps.parse.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: ${{ steps.build.outputs.path }}
          retention-days: 14

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.filename }}
          path: dist/

      - name: Extract release notes
        id: changelog
        run: |
          node scripts/changelog.mjs \
            "${{ needs.build.outputs.pack }}" \
            "${{ needs.build.outputs.version }}"

      - name: Detect pre-release
        id: prerelease
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.build.outputs.version }}" =~ -(rc|beta|alpha) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.build.outputs.display_name }} ${{ needs.build.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*.zip
          fail_on_unmatched_files: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' && 'true' || 'false' }}
