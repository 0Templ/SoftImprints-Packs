name: Release pack

on:
  push:
    tags: ['*-v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build pack
    runs-on: ubuntu-latest

    outputs:
      pack: ${{ steps.parse.outputs.pack }}
      version: ${{ steps.parse.outputs.version }}
      filename: ${{ steps.build.outputs.filename }}
      pack_capitalized: ${{ steps.parse.outputs.pack_capitalized }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          bash scripts/parse-tag.sh "$TAG"

      - name: Build pack
        id: build
        run: |
          bash scripts/build-pack.sh \
            "${{ steps.parse.outputs.pack }}" \
            "${{ steps.parse.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.filename }}
          path: dist/${{ steps.build.outputs.filename }}
          retention-days: 14

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/') && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.filename }}
          path: dist/

      - name: Extract release notes
        run: |
          bash scripts/extract-changelog.sh \
            "packs/${{ needs.build.outputs.pack }}/CHANGELOG.md" \
            "${{ needs.build.outputs.version }}" \
            > release-notes.md
          echo "----- RELEASE NOTES -----"
          cat release-notes.md
          echo "-------------------------"

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${{ needs.build.outputs.version }}" =~ -(rc|beta|alpha) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.build.outputs.pack_capitalized }} Pack v${{ needs.build.outputs.version }}"
          body_path: release-notes.md
          files: dist/${{ needs.build.outputs.filename }}
          fail_on_unmatched_files: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' && 'true' || 'false' }}
